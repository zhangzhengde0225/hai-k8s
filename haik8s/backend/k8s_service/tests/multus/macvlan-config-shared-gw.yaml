# macvlan-conf.yaml (使用共享网关版本)
# 节点网段: 10.5.6.0/24
# 容器网段: 10.5.8.0/24
# 网关: 10.5.6.1 (共享节点网关)
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: macvlan-conf
  namespace: default
spec:
  config: '{
    "cniVersion": "0.3.1",
    "type": "macvlan",
    "master": "enp97s0f0np0",
    "mode": "bridge",
    "ipam": {
      "type": "host-local",
      "subnet": "10.5.8.0/24",
      "rangeStart": "10.5.8.100",
      "rangeEnd": "10.5.8.200",
      "routes": [
        { "dst": "0.0.0.0/0" }
      ],
      "gateway": "10.5.6.1"
    }
  }'
