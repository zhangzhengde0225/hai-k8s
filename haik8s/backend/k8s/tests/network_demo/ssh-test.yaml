# ssh-test.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssh-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ssh-test
  template:
    metadata:
      labels:
        app: ssh-test
    spec:
      containers:
      - name: ssh-server
        image: ubuntu:22.04
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash"]
        args:
          - -c
          - |
            apt-get update && \
            apt-get install -y openssh-server && \
            mkdir -p /var/run/sshd && \
            echo 'root:password123' | chpasswd && \
            sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config && \
            sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config && \
            /usr/sbin/sshd -D
        ports:
        - containerPort: 22
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ssh-lb
spec:
  selector:
    app: ssh-test
  ports:
    - protocol: TCP
      port: 22
      targetPort: 22
  type: LoadBalancer
